<header class="site-header sticky-top">
  {{- $logo := resources.Get "images/thing4.png" -}}
  <div class="container">
    <div class="site-header-bar">
    <a href="/" class="site-header-brand">
      {{- with $logo }}
      <img src="{{ .RelPermalink }}" alt="{{ $.Site.Title }}" class="site-header-logo" width="180" height="48">
      {{- else }}
      {{ .Site.Title }}
      {{- end }}
    </a>

    <!-- Desktop nav -->
    <nav class="site-header-nav d-none d-md-flex" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"
         class="site-header-link{{ if eq $.RelPermalink .URL }} is-active{{ end }}"
         {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
        {{ .Name }}
      </a>
      {{ end }}
      {{- partial "dark-mode-toggle.html" . }}
    </nav>

    <!-- Mobile: dark mode toggle + hamburger -->
    <div class="d-flex align-items-center gap-2 d-md-none">
      {{- partial "dark-mode-toggle.html" . }}
      <button id="menu-toggle" class="site-icon-button" aria-label="Open menu" aria-expanded="false" type="button">
        {{ partial "asset-icon.html" (dict "name" "menu" "class" "site-icon" "attrs" `aria-hidden="true"`) }}
      </button>
    </div>
    </div>
  </div>
</header>

<!-- Mobile drawer -->
<div id="mobile-menu" class="site-mobile-menu d-md-none" aria-hidden="true">
  <div class="site-mobile-menu-header">
    <span class="site-mobile-menu-title">Menu</span>
    <button id="menu-close" class="site-icon-button" aria-label="Close menu" type="button">
      {{ partial "asset-icon.html" (dict "name" "close" "class" "site-icon" "attrs" `aria-hidden="true"`) }}
    </button>
  </div>
  <nav class="site-mobile-menu-nav" aria-label="Mobile navigation">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}"
       class="site-mobile-menu-link{{ if eq $.RelPermalink .URL }} is-active{{ end }}"
       {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
      {{ .Name }}
    </a>
    {{ end }}
  </nav>
</div>
<!-- Backdrop -->
<div id="menu-backdrop" class="site-menu-backdrop d-none d-md-none"></div>

<script>
(function () {
  const toggle = document.getElementById('menu-toggle');
  const close  = document.getElementById('menu-close');
  const menu   = document.getElementById('mobile-menu');
  const backdrop = document.getElementById('menu-backdrop');

  function openMenu() {
    menu.classList.add('is-open');
    menu.setAttribute('aria-hidden', 'false');
    backdrop.classList.remove('d-none');
    toggle.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    menu.classList.remove('is-open');
    menu.setAttribute('aria-hidden', 'true');
    backdrop.classList.add('d-none');
    toggle.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', openMenu);
  close.addEventListener('click', closeMenu);
  backdrop.addEventListener('click', closeMenu);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });
})();

// Dark mode toggle
(function () {
  document.querySelectorAll('.js-theme-toggle').forEach(function (button) {
    button.addEventListener('click', function () {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  });
})();
</script>
