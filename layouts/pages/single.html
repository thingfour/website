{{ define "main" }}
{{- $hasProfileImage := fileExists "static/profile.jpg" }}

<article class="container mx-auto px-4 py-10 max-w-5xl">
  <nav class="text-sm text-gray-500 dark:text-gray-400 mb-6 flex items-center gap-1.5 flex-wrap">
    <a href="/" class="hover:text-blue-700 dark:hover:text-blue-400 transition-colors">Home</a>
    <span>/</span>
    <span class="text-gray-700 dark:text-gray-300">{{ .Title }}</span>
  </nav>

  <section class="grid gap-10 md:grid-cols-[minmax(0,1.3fr)_minmax(280px,0.9fr)] md:items-start">
    <div>
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white leading-tight">
        {{ .Title }}
      </h1>

      {{- with .Params.author }}
      <p class="mt-3 text-sm font-medium uppercase tracking-[0.18em] text-gray-500 dark:text-gray-400">
        {{ . }}
      </p>
      {{- end }}

      <div class="prose prose-gray dark:prose-invert max-w-none mt-8
                  prose-headings:font-bold prose-headings:text-gray-900 dark:prose-headings:text-white
                  prose-a:text-blue-700 dark:prose-a:text-blue-400 prose-a:no-underline hover:prose-a:underline
                  prose-code:before:content-none prose-code:after:content-none
                  prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950
                  prose-img:rounded-none">
        {{ .Content }}
      </div>
    </div>

    {{- if $hasProfileImage }}
    <aside class="md:sticky md:top-24">
      <figure class="border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/40 shadow-sm overflow-hidden">
        <img src="/profile.jpg"
             alt="Łukasz Dywicki"
             class="block w-full aspect-square object-cover"
             width="640"
             height="640"
             loading="lazy"
             decoding="async">
      </figure>
    </aside>
    {{- end }}
  </section>
</article>
{{ end }}
