params:
  github:
    show_edit_link: true
    repo_url: https://github.com/thingfour/thingfour-website
  social_links:
    github: https://github.com/thingfour

permalinks:
  posts: "/posts/:year:month/:title/"
  article: ":section-:title"
  products: "/:sections[1:]-:title/"
  section: ":section-:title"
